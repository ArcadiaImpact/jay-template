# MANAGED FILE - Do not edit. Updates pulled from template. See MANAGED_FILES.md
name: Sync Template Updates

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Add template remote
        run: |
          git remote add template https://github.com/ArcadiaImpact/inspect-eval-template.git 2>/dev/null || true
          git fetch template main

      - name: Extract managed files list
        id: managed
        run: |
          # Parse MANAGED_FILES.md for the file list between markers
          managed_files=$(sed -n '/<!-- MANAGED_FILES_START -->/,/<!-- MANAGED_FILES_END -->/p' MANAGED_FILES.md \
            | grep '^- ' \
            | sed 's/^- `//;s/`$//' \
            | tr '\n' ' ')
          echo "files=$managed_files" >> "$GITHUB_OUTPUT"

      - name: Check for updates
        id: check
        run: |
          has_updates=false
          for file in ${{ steps.managed.outputs.files }}; do
            # Check if file exists in template
            if git cat-file -e "template/main:$file" 2>/dev/null; then
              # Check if file differs or doesn't exist locally
              if ! git diff --quiet HEAD "template/main" -- "$file" 2>/dev/null; then
                echo "Updated: $file"
                has_updates=true
              fi
            fi
          done
          echo "has_updates=$has_updates" >> "$GITHUB_OUTPUT"

      - name: Create sync branch and PR
        if: steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch_name="template-sync/$(date +%Y%m%d)"
          git checkout -b "$branch_name"

          template_version=$(git show template/main:.template-version 2>/dev/null || echo "unknown")

          for file in ${{ steps.managed.outputs.files }}; do
            if git cat-file -e "template/main:$file" 2>/dev/null; then
              # Ensure directory exists
              mkdir -p "$(dirname "$file")"
              git show "template/main:$file" > "$file"
              git add "$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync managed files from template $template_version"
          git push origin "$branch_name"

          gh pr create \
            --title "chore: sync managed files from template ($template_version)" \
            --body "$(cat <<'EOF'
          ## Template Sync

          This PR updates managed files from the [inspect-eval-template](https://github.com/ArcadiaImpact/inspect-eval-template).

          **Template version:** $template_version

          Review the changes below. Managed files are listed in [MANAGED_FILES.md](MANAGED_FILES.md).

          If you have local customizations to any managed files, resolve conflicts carefully.
          EOF
          )"
