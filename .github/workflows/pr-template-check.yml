# MANAGED FILE - Do not edit. Updates pulled from template. See MANAGED_FILES.md
name: PR Template Check

on:
  pull_request:
    branches:
      - main
    types: [opened, edited, synchronize]

jobs:
  check-pr-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check PR body contains template
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "::error::PR body is empty. Please use the PR template."
            exit 1
          fi

          if ! echo "$PR_BODY" | grep -q "Checklist"; then
            echo "::error::PR body does not contain the checklist from the PR template."
            exit 1
          fi
