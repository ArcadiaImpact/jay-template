name: Markdown Lint

on:
  pull_request:
    branches:
      - main

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: markdownlint-fix --all-files
