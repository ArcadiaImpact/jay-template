# Paper-faithful task config for EVMbench (OpenAI, 2026)
#
# Usage:
#   inspect eval evmbench/evmbench_detect \
#       --task-config src/evmbench/paper_config/evmbench.yaml \
#       --model openai/gpt-5.1-2025-11-13
#
# Provenance:
#   scorer: paper uses custom LLM grading with string matching for detect task
#   prompt_mode: paper's exact instruction templates from DETECT.md/PATCH.md/EXPLOIT.md
#   time_limit_hours: paper gives agents 6 hours per audit
#   message_limit: paper uses timeout-based stopping, not turn-based; set high

scorer: original
prompt_mode: original
time_limit_hours: 6
message_limit: 200

# Optional additions (via separate flags):
#   --generate-config src/evmbench/paper_config/generate.yaml
#   --model-role 'grader={"model": "openai/gpt-4o"}'
#   For provider-specific agents (Python only):
#     task_with(solver=claude_code(...))  # requires inspect_swe
