title: "EVMbench: Evaluating AI Agents on Smart Contract Security"
description: |
  Evaluates AI agents on three smart contract security tasks:
  vulnerability detection, patching, and exploitation across
  120 curated vulnerabilities from 43 open-source security audits.
arxiv: https://cdn.openai.com/evmbench/evmbench.pdf
group: Cybersecurity
contributors:
  - jay
version: "1-A"
tasks:
  - name: evmbench_detect
    dataset_samples: 120
  - name: evmbench_patch
    dataset_samples: 120
  - name: evmbench_exploit
    dataset_samples: 120
tags:
  - Agent
metadata:
  sandbox:
    - solver
    - scorer
